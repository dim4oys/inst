idea_filters:
  good:
    - "owner can explain the pain in one sentence"
    - "workflow repeats weekly or daily"
    - "first version can be a bot, form, or small dashboard"
    - "buyer can be reached manually through maps, groups, or DMs"
    - "AI removes conversation work, not just adds decoration"
  bad:
    - "requires a full marketplace from day one"
    - "depends on scraping private user data"
    - "needs complex regulation before first sale"
    - "looks like a generic CRM with no niche wedge"

